[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "python server.py --port 8001"
  targetPort = 8001
  port = 8888
  publish = "dist"
  autoLaunch = false

[[redirects]]
  from = "/api/structure"
  to = "/.netlify/functions/structure"
  status = 200

[[redirects]]
  from = "/api/reset"
  to = "/.netlify/functions/reset"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    X-Frame-Options = "DENY"
